<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>{{ hospital }} 모니터링 관리</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body { font-family: 'Apple SD Gothic Neo', 'Noto Sans KR', sans-serif; background: #f4f6fb; color: #333; }

    /* ── 헤더 ── */
    header {
      background: #1a1f36;
      color: #fff;
      padding: 16px 28px;
      display: flex;
      align-items: center;
      justify-content: space-between;
    }
    header h1 { font-size: 17px; font-weight: 600; }
    header .badge {
      background: #3d82f6;
      border-radius: 12px;
      font-size: 12px;
      padding: 3px 10px;
    }

    /* ── 레이아웃 ── */
    .container { max-width: 1280px; margin: 0 auto; padding: 24px 20px; }

    /* ── 통계 카드 ── */
    .stat-grid {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(180px, 1fr));
      gap: 14px;
      margin-bottom: 24px;
    }
    .stat-card {
      background: #fff;
      border-radius: 10px;
      padding: 18px 20px;
      box-shadow: 0 1px 4px rgba(0,0,0,.06);
    }
    .stat-card .label { font-size: 12px; color: #888; margin-bottom: 6px; }
    .stat-card .value { font-size: 28px; font-weight: 700; color: #1a1f36; }
    .stat-card .sub   { font-size: 11px; color: #aaa; margin-top: 4px; }

    /* ── 필터 바 ── */
    .filter-bar {
      background: #fff;
      border-radius: 10px;
      padding: 14px 18px;
      margin-bottom: 18px;
      display: flex;
      gap: 10px;
      flex-wrap: wrap;
      align-items: center;
      box-shadow: 0 1px 4px rgba(0,0,0,.06);
    }
    .filter-bar input, .filter-bar select {
      padding: 7px 12px;
      border: 1px solid #ddd;
      border-radius: 6px;
      font-size: 13px;
      outline: none;
    }
    .filter-bar input:focus, .filter-bar select:focus { border-color: #3d82f6; }
    .filter-bar button {
      padding: 7px 16px;
      background: #3d82f6;
      color: #fff;
      border: none;
      border-radius: 6px;
      cursor: pointer;
      font-size: 13px;
    }
    .filter-bar button:hover { background: #2563eb; }
    .filter-bar .total-info { margin-left: auto; font-size: 13px; color: #666; }

    /* ── 테이블 ── */
    .table-wrap {
      background: #fff;
      border-radius: 10px;
      box-shadow: 0 1px 4px rgba(0,0,0,.06);
      overflow: hidden;
    }
    table { width: 100%; border-collapse: collapse; font-size: 13px; }
    thead tr { background: #f8f9fc; }
    th {
      padding: 12px 14px;
      text-align: left;
      font-weight: 600;
      color: #555;
      border-bottom: 1px solid #eee;
      white-space: nowrap;
    }
    td {
      padding: 11px 14px;
      border-bottom: 1px solid #f0f0f0;
      vertical-align: middle;
    }
    tr:last-child td { border-bottom: none; }
    tr:hover td { background: #fafbff; }

    /* ── 배지 ── */
    .sev { display: inline-block; padding: 2px 8px; border-radius: 10px; font-size: 11px; font-weight: 600; }
    .sev-high   { background: #fdecea; color: #c0392b; }
    .sev-medium { background: #fff3cd; color: #b45309; }
    .sev-low    { background: #e9f5e9; color: #2d6a4f; }

    .src { display: inline-block; padding: 2px 8px; border-radius: 10px; font-size: 11px; font-weight: 600; }
    .src-blog { background: #e0f2fe; color: #0369a1; }
    .src-cafe { background: #f0fdf4; color: #166534; }

    .tag {
      display: inline-block;
      background: #f1f5f9;
      border-radius: 4px;
      padding: 2px 6px;
      font-size: 11px;
      color: #555;
      margin: 1px;
    }

    /* ── 링크 ── */
    a.post-link { color: #1a73e8; text-decoration: none; font-weight: 500; }
    a.post-link:hover { text-decoration: underline; }

    /* ── 페이지네이션 ── */
    .pagination {
      display: flex;
      gap: 6px;
      justify-content: center;
      padding: 20px 0 4px;
    }
    .pagination button {
      padding: 6px 12px;
      border: 1px solid #ddd;
      border-radius: 6px;
      background: #fff;
      cursor: pointer;
      font-size: 13px;
    }
    .pagination button.active  { background: #3d82f6; color: #fff; border-color: #3d82f6; }
    .pagination button:disabled { opacity: .4; cursor: default; }
    .pagination button:not(.active):hover { background: #f0f4ff; }

    /* ── 모달 ── */
    .modal-overlay {
      display: none;
      position: fixed; inset: 0;
      background: rgba(0,0,0,.45);
      z-index: 100;
      align-items: center;
      justify-content: center;
    }
    .modal-overlay.open { display: flex; }
    .modal {
      background: #fff;
      border-radius: 12px;
      width: 680px;
      max-width: 96vw;
      max-height: 88vh;
      overflow-y: auto;
      padding: 28px;
      box-shadow: 0 8px 32px rgba(0,0,0,.18);
    }
    .modal h2 { font-size: 16px; margin-bottom: 16px; color: #1a1f36; }
    .modal-close {
      float: right; cursor: pointer; font-size: 20px;
      color: #aaa; line-height: 1; margin-top: -4px;
    }
    .modal-close:hover { color: #333; }
    .detail-row { display: flex; gap: 8px; margin-bottom: 10px; align-items: flex-start; }
    .detail-row .dl { min-width: 90px; font-size: 12px; color: #888; padding-top: 1px; }
    .detail-row .dv { font-size: 13px; color: #333; flex: 1; }
    .ai-reason-box {
      background: #f8f9fc; border-radius: 8px; padding: 12px 14px;
      font-size: 13px; line-height: 1.7; color: #444; margin-top: 6px;
    }

    /* ── 로딩 ── */
    .loading { text-align: center; padding: 40px; color: #aaa; font-size: 14px; }

    /* ── 상단 탭 ── */
    .tabs { display: flex; gap: 0; margin-bottom: 0; }
    .tab-btn {
      padding: 10px 22px;
      border: none; border-bottom: 3px solid transparent;
      background: none; cursor: pointer; font-size: 14px; color: #888;
    }
    .tab-btn.active { color: #3d82f6; border-bottom-color: #3d82f6; font-weight: 600; }
    .tab-content { display: none; }
    .tab-content.active { display: block; }

    .noti-table { width: 100%; border-collapse: collapse; font-size: 13px; }
    .noti-table th, .noti-table td { padding: 10px 14px; border-bottom: 1px solid #f0f0f0; text-align: left; }
    .noti-table thead tr { background: #f8f9fc; }
    .status-ok   { color: #2d6a4f; font-weight: 600; }
    .status-fail { color: #c0392b; font-weight: 600; }
  </style>
</head>
<body>

<header>
  <h1>🏥 {{ hospital }} — 콘텐츠 모니터링</h1>
  <span class="badge">매 {{ interval }}분 자동 수집</span>
</header>

<div class="container">

  <!-- 통계 카드 -->
  <div class="stat-grid" id="statGrid">
    <div class="stat-card"><div class="label">총 수집 게시글</div><div class="value" id="sTotalPosts">-</div></div>
    <div class="stat-card"><div class="label">부적절 탐지</div><div class="value" id="sTotalDet" style="color:#c0392b">-</div></div>
    <div class="stat-card"><div class="label">심각도 높음</div><div class="value" id="sHigh" style="color:#a02020">-</div></div>
    <div class="stat-card"><div class="label">심각도 보통</div><div class="value" id="sMedium" style="color:#b45309">-</div></div>
    <div class="stat-card"><div class="label">알림 발송 횟수</div><div class="value" id="sNoti">-</div></div>
  </div>

  <!-- 탭 -->
  <div class="tabs">
    <button class="tab-btn active" onclick="switchTab('detections', this)">알람 리스트</button>
    <button class="tab-btn" onclick="switchTab('notifications', this)">알림 이력</button>
  </div>

  <!-- 탐지 탭 -->
  <div id="tab-detections" class="tab-content active">
    <div class="filter-bar">
      <input id="fKeyword" type="text" placeholder="키워드 검색..." style="width:200px">
      <select id="fSeverity">
        <option value="">심각도 전체</option>
        <option value="high">높음</option>
        <option value="medium">보통</option>
        <option value="low">낮음</option>
      </select>
      <select id="fSource">
        <option value="">출처 전체</option>
        <option value="blog">블로그</option>
        <option value="cafe">카페</option>
      </select>
      <button onclick="loadDetections(1)">검색</button>
      <span class="total-info" id="totalInfo"></span>
    </div>

    <div class="table-wrap">
      <table>
        <thead>
          <tr>
            <th>#</th>
            <th>출처</th>
            <th>제목</th>
            <th>작성자</th>
            <th>심각도</th>
            <th>카테고리</th>
            <th>탐지 키워드</th>
            <th>탐지 일시</th>
            <th></th>
          </tr>
        </thead>
        <tbody id="detectionBody">
          <tr><td colspan="9" class="loading">불러오는 중...</td></tr>
        </tbody>
      </table>
    </div>
    <div class="pagination" id="pagination"></div>
  </div>

  <!-- 알림 이력 탭 -->
  <div id="tab-notifications" class="tab-content">
    <div class="table-wrap" style="margin-top:14px">
      <table class="noti-table">
        <thead>
          <tr>
            <th>#</th><th>발송 시각</th><th>수신자</th><th>탐지 건수</th><th>상태</th>
          </tr>
        </thead>
        <tbody id="notiBody">
          <tr><td colspan="5" class="loading">불러오는 중...</td></tr>
        </tbody>
      </table>
    </div>
  </div>

</div>

<!-- 상세 모달 -->
<div class="modal-overlay" id="modalOverlay" onclick="closeModal(event)">
  <div class="modal" id="modalContent">
    <span class="modal-close" onclick="closeModal()">×</span>
    <h2 id="modalTitle">상세 정보</h2>
    <div id="modalBody"></div>
  </div>
</div>

<script>
let currentPage = 1;

// ── 탭 전환
function switchTab(name, btn) {
  document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active'));
  document.querySelectorAll('.tab-content').forEach(t => t.classList.remove('active'));
  btn.classList.add('active');
  document.getElementById('tab-' + name).classList.add('active');
  if (name === 'notifications') loadNotifications();
}

// ── 통계 로드
async function loadStats() {
  const res = await fetch('/api/stats');
  const d = await res.json();
  document.getElementById('sTotalPosts').textContent = (d.total_posts || 0).toLocaleString();
  document.getElementById('sTotalDet').textContent   = (d.total_detections || 0).toLocaleString();
  document.getElementById('sHigh').textContent       = (d.severity?.high || 0).toLocaleString();
  document.getElementById('sMedium').textContent     = (d.severity?.medium || 0).toLocaleString();
  document.getElementById('sNoti').textContent       = (d.total_notifications || 0).toLocaleString();
}

// ── 탐지 목록 로드
async function loadDetections(page = 1) {
  currentPage = page;
  const keyword  = document.getElementById('fKeyword').value.trim();
  const severity = document.getElementById('fSeverity').value;
  const source   = document.getElementById('fSource').value;

  const params = new URLSearchParams({ page, per_page: 20 });
  if (keyword)  params.set('keyword', keyword);
  if (severity) params.set('severity', severity);
  if (source)   params.set('source', source);

  const tbody = document.getElementById('detectionBody');
  tbody.innerHTML = '<tr><td colspan="9" class="loading">불러오는 중...</td></tr>';

  const res = await fetch('/api/detections?' + params);
  const d   = await res.json();

  document.getElementById('totalInfo').textContent =
    `총 ${d.total.toLocaleString()}건 (${d.total_pages}페이지 중 ${d.page}페이지)`;

  if (!d.items.length) {
    tbody.innerHTML = '<tr><td colspan="9" class="loading">탐지된 게시글이 없습니다.</td></tr>';
    document.getElementById('pagination').innerHTML = '';
    return;
  }

  const sevLabel = { high: '높음', medium: '보통', low: '낮음' };
  const sevClass = { high: 'sev-high', medium: 'sev-medium', low: 'sev-low' };

  tbody.innerHTML = d.items.map((item, idx) => {
    const num   = (page - 1) * 20 + idx + 1;
    const src   = item.source === 'blog' ? '블로그' : '카페';
    const srcCls= 'src-' + item.source;
    const cats  = (item.categories || []).map(c => `<span class="tag">${c}</span>`).join('');
    const kws   = (item.matched_keywords || []).slice(0, 3).map(k => `<span class="tag">${k}</span>`).join('');
    const dt    = item.detected_at ? item.detected_at.substring(0, 16).replace('T', ' ') : '-';
    const title = item.title || '(제목 없음)';
    const sev   = item.severity || 'low';

    return `<tr>
      <td style="color:#aaa">${num}</td>
      <td><span class="src ${srcCls}">${src}</span></td>
      <td><a class="post-link" href="${item.post_link}" target="_blank">${escHtml(title)}</a></td>
      <td style="color:#666">${escHtml(item.blogger_name || '-')}</td>
      <td><span class="sev ${sevClass[sev]}">${sevLabel[sev] || sev}</span></td>
      <td>${cats || '-'}</td>
      <td>${kws || '-'}</td>
      <td style="white-space:nowrap;color:#888">${dt}</td>
      <td><button onclick="openDetail(${item.id})"
            style="padding:4px 10px;font-size:12px;border:1px solid #ddd;border-radius:5px;background:#fff;cursor:pointer;">
          상세
        </button></td>
    </tr>`;
  }).join('');

  renderPagination(d.page, d.total_pages);
}

// ── 페이지네이션 렌더링
function renderPagination(current, total) {
  const container = document.getElementById('pagination');
  if (total <= 1) { container.innerHTML = ''; return; }

  let html = `<button ${current===1?'disabled':''} onclick="loadDetections(${current-1})">◀ 이전</button>`;

  const start = Math.max(1, current - 2);
  const end   = Math.min(total, current + 2);
  for (let p = start; p <= end; p++) {
    html += `<button class="${p===current?'active':''}" onclick="loadDetections(${p})">${p}</button>`;
  }
  html += `<button ${current===total?'disabled':''} onclick="loadDetections(${current+1})">다음 ▶</button>`;
  container.innerHTML = html;
}

// ── 상세 모달
async function openDetail(id) {
  const res = await fetch(`/api/detections/${id}`);
  if (!res.ok) return;
  const d = await res.json();

  const sevLabel = { high: '높음', medium: '보통', low: '낮음' };
  const sevClass = { high: 'sev-high', medium: 'sev-medium', low: 'sev-low' };
  const sev = d.severity || 'low';
  const cats = (d.categories || []).map(c => `<span class="tag">${c}</span>`).join(' ');
  const kws  = (d.matched_keywords || []).map(k => `<span class="tag">${k}</span>`).join(' ');
  const src  = d.source === 'blog' ? '블로그' : '카페';
  const dt   = d.detected_at ? d.detected_at.substring(0, 16).replace('T',' ') : '-';

  document.getElementById('modalTitle').textContent = d.title || '(제목 없음)';
  document.getElementById('modalBody').innerHTML = `
    <div class="detail-row"><span class="dl">출처</span><span class="dv"><span class="src src-${d.source}">${src}</span>${d.cafe_name ? ' — ' + escHtml(d.cafe_name) : ''}</span></div>
    <div class="detail-row"><span class="dl">작성자</span><span class="dv">${escHtml(d.blogger_name || '-')}</span></div>
    <div class="detail-row"><span class="dl">게시 일자</span><span class="dv">${d.post_date || '-'}</span></div>
    <div class="detail-row"><span class="dl">탐지 일시</span><span class="dv">${dt}</span></div>
    <div class="detail-row"><span class="dl">심각도</span><span class="dv"><span class="sev ${sevClass[sev]}">${sevLabel[sev] || sev}</span></span></div>
    <div class="detail-row"><span class="dl">신뢰도</span><span class="dv">${Math.round((d.confidence||0)*100)}%</span></div>
    <div class="detail-row"><span class="dl">카테고리</span><span class="dv">${cats || '-'}</span></div>
    <div class="detail-row"><span class="dl">탐지 키워드</span><span class="dv">${kws || '-'}</span></div>
    <div class="detail-row"><span class="dl">미리보기</span><span class="dv" style="color:#555">${escHtml(d.description || '-')}</span></div>
    <div class="detail-row"><span class="dl">AI 판단</span><span class="dv"></span></div>
    <div class="ai-reason-box">${escHtml(d.ai_reason || 'AI 분석 없음')}</div>
    <div style="margin-top:14px">
      <a href="${d.post_link}" target="_blank"
         style="display:inline-block;padding:8px 18px;background:#1a73e8;color:#fff;border-radius:6px;text-decoration:none;font-size:13px;">
        원문 보기 →
      </a>
    </div>`;

  document.getElementById('modalOverlay').classList.add('open');
}

function closeModal(e) {
  if (e && e.target !== document.getElementById('modalOverlay')) return;
  document.getElementById('modalOverlay').classList.remove('open');
}

// ── 알림 이력 로드
async function loadNotifications() {
  const tbody = document.getElementById('notiBody');
  tbody.innerHTML = '<tr><td colspan="5" class="loading">불러오는 중...</td></tr>';
  const res = await fetch('/api/notifications');
  const items = await res.json();

  if (!items.length) {
    tbody.innerHTML = '<tr><td colspan="5" class="loading">발송 이력이 없습니다.</td></tr>';
    return;
  }

  tbody.innerHTML = items.map((item, idx) => {
    const dt = item.sent_at ? item.sent_at.substring(0, 16).replace('T',' ') : '-';
    const stCls = item.status === 'success' ? 'status-ok' : 'status-fail';
    const stTxt = item.status === 'success' ? '성공' : '실패';
    return `<tr>
      <td style="color:#aaa">${idx+1}</td>
      <td>${dt}</td>
      <td>${escHtml(item.recipient || '-')}</td>
      <td>${item.post_count}건</td>
      <td class="${stCls}">${stTxt}</td>
    </tr>`;
  }).join('');
}

// ── XSS 방지
function escHtml(s) {
  return String(s)
    .replace(/&/g,'&amp;').replace(/</g,'&lt;')
    .replace(/>/g,'&gt;').replace(/"/g,'&quot;');
}

// ── 엔터 검색
document.getElementById('fKeyword').addEventListener('keydown', e => {
  if (e.key === 'Enter') loadDetections(1);
});

// ── 초기 로드
loadStats();
loadDetections(1);

// 1분마다 통계 자동 갱신
setInterval(loadStats, 60_000);
</script>
</body>
</html>
